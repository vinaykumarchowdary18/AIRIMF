name: Python Package using Conda

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn shap matplotlib seaborn joblib

      - name: Check imports work
        run: |
          python -c "
          import pandas
          import numpy
          import sklearn
          import shap
          import matplotlib
          import seaborn
          import joblib
          print('All AIRIMF dependencies OK')
          "
